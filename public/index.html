<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f5efe8" />
    <meta
      name="description"
      content="The Re-Entry Brief. For the product leader who stepped away."
    />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
    <title>The Re-Entry Brief</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Hidden form for Netlify to detect at build time -->
    <form name="feedback" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
